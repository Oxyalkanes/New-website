{% extends 'base.html' %}

{% block content %}
<h1>分类管理</h1>
<a href="{{ url_for('new_category') }}" class="btn btn-success mb-3">新建分类</a>
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>名称</th>
            <th>描述</th>
            <th>视频数</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for category in categories %}
        <tr>
            <td>{{ category.id }}</td>
            <td>{{ category.name }}</td>
            <td>{{ category.description }}</td>
            <td>{{ category.videos|length }}</td>
            <td>
                <a href="{{ url_for('edit_category', category_id=category.id) }}" class="btn btn-sm btn-warning">编辑</a>
                <form action="{{ url_for('delete_category', category_id=category.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('确定删除该分类吗？分类下的视频将变为未分类。');">
                    <button type="submit" class="btn btn-sm btn-danger">删除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
